<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  /* Reset y configuración de altura para usar porcentajes en hijos */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: sans-serif;
  }

  /* Contenedor principal: 80% ancho, 95% alto, centrado */
  .layout-wrapper {
    width: 80%;
    height: 95%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 10px;
  }

  /* Encabezado: 20% de alto */
  header {
    height: 20%;
    background-color: #8a2be2; /* Púrpura */
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #adff2f; /* Verde amarillento */
    font-weight: bold;
  }

  /* Barra de navegación */
  nav {
    height: 8%;
    background-color: #5f9ea0; /* Verde azulado */
    border-radius: 10px;
  }

  /* Sección principal que contiene artículos y sidebar */
  main {
    flex: 1; /* Ocupa el espacio restante entre header/nav y footer */
    display: flex;
    gap: 10px;
  }

  /* Contenedor de artículos */
  section {
    flex: 2;
    background-color: #7fffd4; /* Aguamarina claro */
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  article {
    background-color: #b22222; /* Rojo ladrillo */
    flex: 1;
    border-radius: 8px;
    color: white;
    padding: 5px 10px;
    font-size: 10px;
  }

  /* Sidebar (Derecha) */
  aside {
    flex: 1;
    background-color: #deb887; /* Madera clara */
    border-radius: 10px;
  }

  /* Pie de página: 15% de alto */
  footer {
    height: 15%;
    background-color: #556b2f; /* Verde oliva oscuro */
    border-radius: 10px;
  }
</style>
</head>
<body>

  <div class="layout-wrapper">
    <header>Ejemplo maquetacion</header>
    
    <nav></nav>

    <main>
      <section>
        <article>articulo 1</article>
        <article>articulo 2</article>
        <article>articulo 3</article>
        <article>articulo 4</article>
        <article>articulo 5</article>
      </section>
      
      <aside></aside>
    </main>

    <footer></footer>
  </div>

</body>
</html>
